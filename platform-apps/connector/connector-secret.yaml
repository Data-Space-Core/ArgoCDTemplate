apiVersion: v1
kind: Secret
metadata:
  name: connector-secret
type: Opaque
stringData:
  POSTGRES_USER: postgresuserb
  POSTGRES_PASSWORD: password
  POSTGRES_DB: connectorbdb

  # Replace these placeholders with real file contents or switch to sealed-secrets/external-secrets
  config.json: |
    {
      "replace": "me"
    }

  # These are placeholders. For real use, create the secret from files instead.
  default-connector-keystore.p12: |
    REPLACE_WITH_BASE64_OR_FILE_BASED_SECRET
  truststore.p12: |
    REPLACE_WITH_BASE64_OR_FILE_BASED_SECRET
    