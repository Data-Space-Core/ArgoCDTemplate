apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: omejdn-daps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Data-Space-Core/ArgoCDTemplate.git
    targetRevision: main
    path: platform-apps/omejdn-daps
  destination:
    server: https://kubernetes.default.svc
    namespace: omejdn-daps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

